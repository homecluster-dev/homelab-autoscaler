apiVersion: infra.homecluster.dev/v1alpha1
kind: Node
metadata:
  name: k3d-homelab-autoscaler-agent-0
  labels:
    group: group1
  namespace: homelab-autoscaler-system
spec:
  kubernetesNodeName: k3d-homelab-autoscaler-agent-0
  powerState: "on"
  pricing:
    hourlyRate: "1.5"
    podRate: "0.0"
  startupPodSpec:
    image: curlimages/curl:latest
    command:
      - /bin/sh
    args:
      - -c
      - |
        source /config/startup-config.sh
        curl http://vm-control-host.homelab-autoscaler-system.svc.cluster.local:8080/start?vm=k3d-homelab-autoscaler-agent-0
    serviceAccount: controller-manager
    volumes:
      - name: config
        configMapName: startup-config
        mountPath: /config
  shutdownPodSpec:
    image: curlimages/curl:latest
    command:
      - /bin/sh
    args:
      - -c
      - |
        source /config/shutdown-config.sh
        curl http://vm-control-host.homelab-autoscaler-system.svc.cluster.local:8080/stop?vm=k3d-homelab-autoscaler-agent-0
    serviceAccount: controller-manager
    volumes:
      - name: config
        configMapName: shutdown-config
        mountPath: /config
      - name: auth
        secretName: auth-secrets
        mountPath: /auth
---
