---
# ConfigMap for startup scripts
apiVersion: v1
kind: ConfigMap
metadata:
  name: startup-config
  namespace: homelab-autoscaler-system
data:
  startup-config.sh: |
    # Startup configuration script
    echo "Starting node..."
---
# ConfigMap for shutdown scripts
apiVersion: v1
kind: ConfigMap
metadata:
  name: shutdown-config
  namespace: homelab-autoscaler-system
data:
  shutdown-config.sh: |
    # Shutdown configuration script
    echo "Shutting down node..."
---
# Secret for authentication tokens
apiVersion: v1
kind: Secret
metadata:
  name: auth-secrets
  namespace: homelab-autoscaler-system
type: Opaque
data:
  token: YWRtaW4tc2VjcmV0LXRva2VuLWZvci10ZXN0aW5n